---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-app # See: ./README.md
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox
  labels:
    app: sandbox
spec:
  replicas: 5
  selector:
    matchLabels:
      app: sandbox
  template:
    metadata:
      labels:
        app: sandbox
      annotations:
        # See: ./README.md
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "sandbox-app"
        vault.hashicorp.com/agent-inject-secret-.env: "clam/data/sandbox"
        vault.hashicorp.com/agent-inject-template-.env: |
          {{- with secret "clam/data/sandbox" -}}
          SHELL={{ .Data.data.shell }}
          PEARL={{ .Data.data.pearl }}
          {{- end }}
    spec:
      serviceAccountName: sandbox-app
      containers:
        - name: nginx
          image: nginx:1.25.2
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox
spec:
  selector:
    app: sandbox
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sandbox-ingress
  namespace: sandbox
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - http:
        paths:
          - path: /sandbox
            pathType: Prefix
            backend:
              service:
                name: sandbox
                port:
                  number: 80
