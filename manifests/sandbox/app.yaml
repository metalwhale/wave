---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-app # See: ./README.md
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-0
  labels:
    app: sandbox
spec:
  template:
    spec:
      containers:
        - name: nginx
          env:
            - name: INDEX
              value: "0"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-1
  labels:
    app: sandbox
spec:
  template:
    spec:
      containers:
        - name: nginx
          env:
            - name: INDEX
              value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox
spec:
  selector:
    app: sandbox
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sandbox-ingress
  namespace: sandbox
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - http:
        paths:
          - path: /sandbox
            pathType: Prefix
            backend:
              service:
                name: sandbox
                port:
                  number: 80
