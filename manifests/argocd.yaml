---
# See: https://argo-cd.readthedocs.io/en/stable/operator-manual/ingress/#option-2-multiple-ingress-objects-and-hosts
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-http-ingress
  namespace: argocd
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  rules:
    - http:
        paths:
          - path: /argocd # The root path. See: wave/kubernetes/custom/roles/argocd/tasks/main.yml
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  name: http
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubeflow
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/metalwhale/wave.git
    targetRevision: HEAD
    path: manifests/kubeflow
  destination:
    server: https://kubernetes.default.svc
    namespace: kubeflow
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  ignoreDifferences:
    # See: https://github.com/argoproj/argo-cd/issues/1487
    - group: admissionregistration.k8s.io
      kind: "*"
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
        - .webhooks[].rules
        - .webhooks[].failurePolicy
      managedFieldsManagers:
        - kube-controller-manager
    # See: https://github.com/argoproj/argo-cd/issues/2382
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      jqPathExpressions:
        - .rules
      managedFieldsManagers:
        - clusterrole-aggregation-controller
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: inferenceservices.serving.kserve.io
      jqPathExpressions:
        - .spec.conversion.webhook.clientConfig.caBundle
