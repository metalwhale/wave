---
apiVersion: v1
kind: Namespace
metadata:
  name: newswaters
  labels:
    name: newswaters
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: newswaters
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/metalwhale/wave.git
    targetRevision: HEAD
    path: manifests/newswaters
  destination:
    server: https://kubernetes.default.svc
    namespace: newswaters
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: "*"
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
