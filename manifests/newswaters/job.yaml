                - name: DATABASE_USER
                  value: app
                - name: DATABASE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: coral-app
                      key: password
                - name: SKIMMER_IS_JOB
                  value: "true"
                - name: SKIMMER_COLLECT_ITEM_URLS_NUM
                  value: "100000"
