---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: skimmer-summarize-and-analyze-texts
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  concurrencyPolicy: Replace
  schedule: "15 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            # See: https://github.com/metalwhale/newswaters
            - name: skimmer-summarize-and-analyze-texts
              image: metalwhaledev/newswaters-skimmer:0.5.2
              imagePullPolicy: Always
              env:
                - name: DATABASE_HOST
                  value: coral-rw.newswaters.svc
                - name: DATABASE_DB
                  value: app
                - name: DATABASE_USER
                  value: app
                - name: DATABASE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: coral-app
                      key: password
                - name: ECHOLOCATOR_HOST
                  value: echolocator-primary.newswaters.svc
                - name: ECHOLOCATOR_PORT
                  value: "3000"
                - name: SKIMMER_IS_JOB
                  value: "true"
                - name: SKIMMER_SUMMARIZE_TEXTS_NUM
                  value: "15"
                - name: SKIMMER_ANALYZE_TEXTS_NUM
                  value: "45"
                - name: SKIMMER_ANALYZE_ADDITIONAL_TEXTS
                  value: "true"
                - name: SKIMMER_ANALYZE_ADDITIONAL_TEXTS_FOLLOW_SUMMARIES
                  value: "true"
              command:
                - /bin/sh
                - -c
                - skimmer summarize_texts && skimmer analyze_texts
              resources:
                requests:
                  memory: "1Gi"
                  cpu: "500m"
                limits:
                  memory: "2Gi"
                  cpu: "1000m"
              securityContext:
                runAsUser: 1000
          restartPolicy: Never
  successfulJobsHistoryLimit: 1
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: skimmer-embed-summaries-and-keywords
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  concurrencyPolicy: Replace
  schedule: "0,30 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            # See: https://github.com/metalwhale/newswaters
            - name: skimmer-embed-summaries-and-keywords
              image: metalwhaledev/newswaters-skimmer:0.5.2
              imagePullPolicy: Always
              env:
                - name: DATABASE_HOST
                  value: coral-rw.newswaters.svc
                - name: DATABASE_DB
                  value: app
                - name: DATABASE_USER
                  value: app
                - name: DATABASE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: coral-app
                      key: password
                - name: SEARCH_ENGINE_HOST
                  value: search-engine.newswaters.svc
                - name: SEARCH_ENGINE_PORT
                  value: "3000"
                - name: SEARCH_ENGINE_VECTOR_SUMMARY_COLLECTION_NAME
                  value: item_summary
                - name: SEARCH_ENGINE_VECTOR_KEYWORD_COLLECTION_NAME
                  value: analysis_keyword
                - name: ECHOLOCATOR_HOST
                  value: echolocator-secondary.newswaters.svc
                - name: ECHOLOCATOR_PORT
                  value: "3000"
                - name: SKIMMER_IS_JOB
                  value: "true"
                - name: SKIMMER_EMBED_SUMMARIES_NUM
                  value: "1000000"
                - name: SKIMMER_EMBED_KEYWORDS_NUM
                  value: "1000000"
                - name: SKIMMER_CHUNK_SIZE
                  value: "50"
              command:
                - /bin/sh
                - -c
                - skimmer embed_summaries && skimmer embed_keywords
              resources:
                requests:
                  memory: "1Gi"
                  cpu: "500m"
                limits:
                  memory: "2Gi"
                  cpu: "1000m"
              securityContext:
                runAsUser: 1000
          restartPolicy: Never
  successfulJobsHistoryLimit: 1
