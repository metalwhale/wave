---
apiVersion: batch/v1
kind: Job
metadata:
  name: skimmer-migration
spec:
  template:
    spec:
      containers:
        # See: https://github.com/metalwhale/newswaters
        - name: skimmer-migration
          image: metalwhaledev/newswaters-skimmer:0.5.2
          imagePullPolicy: Always
          env:
            - name: DATABASE_HOST
              value: coral-rw.newswaters.svc
            - name: DATABASE_DB
              value: app
            - name: DATABASE_USER
              value: app
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: coral-app
                  key: password
            - name: DATABASE_URL
              value: "postgres://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST)/$(DATABASE_DB)"
          command:
            - diesel
            - migration
            - run
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      restartPolicy: OnFailure
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: skimmer-collect-items
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  concurrencyPolicy: Replace
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            # See: https://github.com/metalwhale/newswaters
            - name: skimmer-collect-items
              image: metalwhaledev/newswaters-skimmer:0.5.2
              imagePullPolicy: Always
              env:
                - name: DATABASE_HOST
                  value: coral-rw.newswaters.svc
                - name: DATABASE_DB
                  value: app
                - name: DATABASE_USER
                  value: app
                - name: DATABASE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: coral-app
                      key: password
                - name: SKIMMER_IS_JOB
                  value: "true"
                - name: SKIMMER_COLLECT_ITEMS_NUM
                  value: "100000"
                - name: SKIMMER_PERMITS_NUM
                  value: "50"
                - name: SKIMMER_CHUNK_SIZE
                  value: "1000"
              command:
                - skimmer
                - collect_items
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "500m"
                limits:
                  memory: "1Gi"
                  cpu: "2000m"
              securityContext:
                runAsUser: 1000
          restartPolicy: Never
  successfulJobsHistoryLimit: 1
---
