---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beach
  labels:
    app: beach
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beach
  template:
    metadata:
      labels:
        app: beach
    spec:
      containers:
        - name: beach
          image: ubuntu:22.04
          env:
            - name: DATABASE_HOST
              value: coral-ro.newswaters.svc
            - name: DATABASE_DB
              value: app
            - name: DATABASE_USER
              value: app
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: coral-app
                  key: password
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          stdin: true
          tty: true
---
apiVersion: batch/v1
kind: Job
metadata:
  name: skimmer-migration
spec:
  template:
    spec:
      containers:
        # See: https://github.com/metalwhale/newswaters
        - name: skimmer-migration
          image: metalwhaledev/newswaters-skimmer:0.1.4
          imagePullPolicy: Always
          env:
            - name: DATABASE_HOST
              value: coral-rw.newswaters.svc
            - name: DATABASE_DB
              value: app
            - name: DATABASE_USER
              value: app
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: coral-app
                  key: password
            - name: DATABASE_URL
              value: "postgres://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST)/$(DATABASE_DB)"
          command:
            - diesel
            - migration
            - run
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      restartPolicy: OnFailure
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: skimmer-items
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            # See: https://github.com/metalwhale/newswaters
            - name: skimmer-items
              image: metalwhaledev/newswaters-skimmer:0.1.4
              imagePullPolicy: Always
              env:
                - name: DATABASE_HOST
                  value: coral-rw.newswaters.svc
                - name: DATABASE_DB
                  value: app
                - name: DATABASE_USER
                  value: app
                - name: DATABASE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: coral-app
                      key: password
                - name: SKIMMER_IS_JOB
                  value: "true"
                - name: SKIMMER_ITEMS_NUM
                  value: "100000"
                - name: SKIMMER_PERMITS_NUM
                  value: "50"
                - name: SKIMMER_BATCH_SIZE
                  value: "1000"
              command:
                - skimmer
                - items
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "500m"
                limits:
                  memory: "1Gi"
                  cpu: "2000m"
              securityContext:
                runAsUser: 1000
          restartPolicy: Never
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: skimmer-item-urls
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  schedule: "10 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            # See: https://github.com/metalwhale/newswaters
            - name: skimmer-item-urls
              image: metalwhaledev/newswaters-skimmer:0.1.4
              imagePullPolicy: Always
              env:
                - name: DATABASE_HOST
                  value: coral-rw.newswaters.svc
                - name: DATABASE_DB
                  value: app
                - name: DATABASE_USER
                  value: app
                - name: DATABASE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: coral-app
                      key: password
                - name: SKIMMER_IS_JOB
                  value: "true"
                - name: SKIMMER_ITEMS_NUM
                  value: "100000"
                - name: SKIMMER_PERMITS_NUM
                  value: "10"
                - name: SKIMMER_BATCH_SIZE
                  value: "100000"
              command:
                - skimmer
                - item_urls
              resources:
                requests:
                  memory: "4Gi"
                  cpu: "1000m"
                limits:
                  memory: "8Gi"
                  cpu: "2000m"
              securityContext:
                runAsUser: 1000
          restartPolicy: Never
