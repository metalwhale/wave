apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: grafana # See: https://artifacthub.io/packages/helm/grafana/grafana/7.3.2
    version: 7.3.2
    repo: https://grafana.github.io/helm-charts
    namespace: whirlpool
    releaseName: monitor
    valuesInline:
      persistence:
        enabled: true
      grafana.ini:
        server:
          domain: grafana.whirlpool.wave.m-cloud.dev
      ingress:
        enabled: true
        hosts:
          - grafana.whirlpool.wave.m-cloud.dev
  - name: crossplane # See: https://artifacthub.io/packages/helm/crossplane/crossplane/1.16.0-rc.0.40.gd8173e7f
    version: 1.16.0-rc.0.40.gd8173e7f
    repo: https://charts.crossplane.io/master/
    namespace: whirlpool
    releaseName: crossplane

# See: https://marketplace.upbound.io/providers/grafana/provider-grafana/v0.10.2/managed-resources
resources:
  - ./secret.yaml
  - ./provider.yaml
  - ./organization.yaml
